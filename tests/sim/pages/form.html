<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IIM Simulation — Form</title>
  <style>body{font-family:sans-serif;max-width:560px;margin:40px auto}label{display:block;margin-top:12px}input,select{width:100%;padding:8px}</style>
</head>
<body>
  <h1 data-testid="page-title">IIM Form</h1>
  <form id="iim-form" onsubmit="event.preventDefault();document.getElementById('toast').style.display='block';">
    <label for="loan_number">Loan Number</label>
    <input data-testid="loan-input" id="loan_number" name="loan_number" aria-label="Loan Number">

    <label for="status">Status</label>
    <select data-testid="status-select" id="status" name="status" aria-label="Status">
      <option>Open</option>
      <option>Closed</option>
      <option>Pending</option>
    </select>

    <label for="amount">Amount</label>
    <input data-testid="amount-input" id="amount" name="amount" aria-label="Amount">

    <button data-testid="submit-btn" id="submit" type="submit" aria-label="Submit">Submit</button>
  </form>
  <div id="toast" data-testid="success-toast" role="status" style="display:none;background:#dfd;padding:12px;margin-top:20px">Saved successfully.</div>
</body>
</html>
